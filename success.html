<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registration successful – Notify</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #030305;
      color: #F0F0FF;
      font-family: system-ui, 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
    }
    .topic {
      background: #1e1e2e;
      padding: 1rem;
      border-radius: 12px;
      font-family: monospace;
      word-break: break-all;
      margin: 1rem 0;
      font-size: 1rem;
    }
    button {
      background: #6c63ff;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }
    a { color: #6c63ff; text-decoration: none; }
    .store-links { margin-top: 1rem; display: flex; gap: 1rem; justify-content: center; }
  </style>
</head>
<body>
<div class="card">
  <h1>🎉 You're registered!</h1>
  <p>Subscribe to this topic in the <strong>ntfy</strong> app:</p>
  <div class="topic" id="topic"></div>
  <button id="copyBtn">Copy topic</button>
  <div class="store-links">
    <a href="https://play.google.com/store/apps/details?id=io.heckel.ntfy" target="_blank">📱 Android</a>
    <a href="https://apps.apple.com/app/ntfy/id1625396347" target="_blank">📱 iPhone</a>
  </div>
  <p style="margin-top: 1.5rem"><a href="status.html?ucp_id=" id="statusLink">Check your trial status →</a></p>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const ucp_id = params.get("ucp_id");
  const ntfy = params.get("ntfy");
  document.getElementById("topic").innerText = ntfy;
  document.getElementById("statusLink").href = `status.html?ucp_id=${ucp_id}`;
  document.getElementById("copyBtn").onclick = () => {
    navigator.clipboard.writeText(ntfy);
    alert("Topic copied!");
  };
</script>
</body>
</html>
